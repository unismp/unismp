name: Supabase keep-alive

# El plan gratuito de Supabase pausa el proyecto tras 7 dias de inactividad.
# Este cron hace una consulta minima cada 3 dias para mantenerlo activo.
on:
  schedule:
    - cron: '0 7 */3 * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST
        run: |
          curl -sf \
            "${{ vars.VITE_SUPABASE_URL }}/rest/v1/community_posts?select=id&limit=1" \
            -H "apikey: ${{ vars.VITE_SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ vars.VITE_SUPABASE_ANON_KEY }}" \
            > /dev/null && echo "Supabase ping OK"
