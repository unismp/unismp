name: Backup Supabase DB

# El plan gratuito NO incluye backups automaticos. Este cron exporta el esquema
# y los datos cada semana y los guarda como artifact del workflow (descargable).
on:
  schedule:
    - cron: '0 5 * * 0'
  workflow_dispatch:

jobs:
  dump:
    runs-on: ubuntu-latest
    steps:
      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Dump schema
        run: supabase db dump --db-url "${{ secrets.SUPABASE_DB_URL }}" -f schema.sql

      - name: Dump data
        run: supabase db dump --db-url "${{ secrets.SUPABASE_DB_URL }}" --data-only -f data.sql

      - uses: actions/upload-artifact@v4
        with:
          name: supabase-backup-${{ github.run_id }}
          path: |
            schema.sql
            data.sql
          retention-days: 30
